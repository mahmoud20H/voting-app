x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  vote:
    build: 
      context: ./vote
      target: final
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    healthcheck: 
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 15s
      timeout: 5s
      retries: 3
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - front-tier
      - back-tier
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging: *default-logging

  result:
    build: ./result
    entrypoint: node server.js
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - front-tier
      - back-tier
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging: *default-logging

  worker:
    build:
      context: ./worker
    depends_on:
      redis:
        condition: service_healthy 
      db:
        condition: service_healthy 
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - POSTGRES_PASSWORD=postgres
    networks:
      - back-tier
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging: *default-logging

  auth:
    build: ./auth
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_PASSWORD=postgres
      - AUTH_SECRET=${AUTH_SECRET}
      - DEFAULT_ADMIN_USER=${DEFAULT_ADMIN_USER}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
    networks:
      - front-tier
      - back-tier
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    logging: *default-logging

  nginx:
    build: ./nginx
    depends_on:
      vote:
        condition: service_started
      result:
        condition: service_started
      auth:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - front-tier
    restart: always
    logging: *default-logging

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: "5s"
    networks:
      - back-tier
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    logging: *default-logging

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - "db-data:/var/lib/postgresql/data"
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/postgres.sh
      interval: "5s"
    networks:
      - back-tier
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging: *default-logging

  # this service runs once to seed the database with votes
  seed:
    build: ./seed-data
    profiles: ["seed"]
    depends_on:
      vote:
        condition: service_healthy 
    networks:
      - front-tier
    restart: "no"

volumes:
  db-data:

networks:
  front-tier:
  back-tier:
