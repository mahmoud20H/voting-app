name: Security Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  Semgrep-SAST:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Semgrep SAST scan
        run: |
            pip install semgrep
            semgrep --config p/default --sarif --output semgrep.sarif . || true

      - name: Upload Semgrep SARIF as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
            name: semgrep-results-${{ github.ref_name }}-${{ github.sha }}
            path: semgrep.sarif

  Trivy-SCA:
    name: Trivy SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode (SCA)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-sca.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SCA artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: trivy-sca-results-${{ github.ref_name }}-${{ github.sha }}
          path: trivy-sca.sarif
