name: Security Tests

on:
#   push:
#     branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  Semgrep-SAST:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Semgrep SAST scan
        run: |
            pip install semgrep
            semgrep --config p/default --sarif --output semgrep.sarif . || true

      - name: Upload Semgrep SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: semgrep-results-${{ github.repository_owner }}-${{ github.event.repository.name }}
            path: semgrep.sarif

